# fast-api & django 호환
name: python-server-cicd
on:
  push:
    branches:
      - main

# 한 번에 하나만 실행(같은 브랜치 기준)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PROJECT_NAME: eodaego-ai
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_NETWORK: eodaego-internal

jobs:
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'version(') }} # 특정 커밋 메시지 워크플로 실행 제외
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 캐시 설정
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:${{ github.ref_name }}
          # 이미지 안에 빌드 메타정보(선택)
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-to: type=inline

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: SSH 원격 서버 연결
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            
            echo "환경변수 설정..."
            PW=${{ secrets.SERVER_PASSWORD }}
            BRANCH=${{ github.ref_name }}
            PROJECT_NAME=${{ env.PROJECT_NAME }}
            CONTAINER_NAME=${{ env.PROJECT_NAME }}
            IMAGE=${{ env.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:${BRANCH}
            NETWORK=${{ env.DOCKER_NETWORK }}
            WORKDIR="/opt/${PROJECT_NAME}/${BRANCH}"
            
            echo "브랜치: ${BRANCH}"
            echo "이미지: ${IMAGE}"
            echo "컨테이너: ${CONTAINER_NAME}"
            
            echo "도커 이미지 풀 : ${IMAGE}"
            echo $PW | sudo -S docker pull "${IMAGE}"
            
            echo "컨테이너 ${CONTAINER_NAME} 존재 여부 확인 중..."
            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "컨테이너 ${CONTAINER_NAME} 이(가) 존재합니다. 중지 및 삭제 중..."
              echo $PW | sudo -S docker rm -f "${CONTAINER_NAME}"
              echo "컨테이너 ${CONTAINER_NAME} 이(가) 삭제되었습니다."
            else
              echo "존재하는 컨테이너 ${CONTAINER_NAME} 이(가) 없습니다."
            fi
            
            echo "디렉토리 구조 생성"
            echo $PW | sudo -S mkdir -p "${WORKDIR}"
            
            echo ".env 파일 구성"
            echo '${{ secrets.ENV_FILE }}' | sudo tee "${WORKDIR}/.env" > /dev/null

            echo "내부망 ${NETWORK} 존재 여부 확인 중..."
            if ! sudo docker network inspect "${NETWORK}" >/dev/null 2>&1; then
              echo "내부망 ${NETWORK} 이(가) 없어 새로 생성합니다."
              echo $PW | sudo -S docker network create "${NETWORK}"
            fi

            echo "DB 마이그레이션 적용 중..."
            # 새 이미지로 1회성 컨테이너를 띄워 alembic upgrade head만 실행 후 제거(--rm)
            # set -e 로 인해 마이그레이션 실패 시 아래 앱 컨테이너 기동 없이 배포가 즉시 중단됨
            echo $PW | sudo -S docker run --rm \
              --network "${NETWORK}" \
              --env-file "${WORKDIR}/.env" \
              "${IMAGE}" \
              uv run alembic upgrade head

            echo "새로운 컨테이너 ${CONTAINER_NAME} 실행 중..."
            # 임시 예외(2026-07-24~실서비스 전환 전까지): 개발 편의를 위해 호스트 포트 8001을 컨테이너 내부 포트 8000에 매핑해 공개.
            # 실서비스 전환 시 -p 옵션을 제거해 내부망 전용으로 원복할 것 (.claude/rules/00-project-overview.md 참고)
            echo $PW | sudo -S docker run -d --name "${CONTAINER_NAME}" \
              --network "${NETWORK}" \
              -p 8001:8000 \
              -e TZ=Asia/Seoul \
              --env-file "${WORKDIR}/.env" \
              -v /etc/localtime:/etc/localtime:ro \
              "${IMAGE}"

            # <none> 태그로 남은 이미지 정리
            echo "불필요한 dangling(<none>) 이미지 정리..."
            echo $PW | sudo -S docker image prune -af
            
            echo "배포가 성공적으로 완료되었습니다."
